
<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8"/>

<meta
  name="viewport"
  content="
  width=device-width,
  initial-scale=1.0,
  maximum-scale=1.0,
  user-scalable=no
  "
/>

<title>DR1 • Controle de Baterias</title>

<meta
  name="theme-color"
  content="#001f3f"
/>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{

  margin:0;
  padding:0;
  box-sizing:border-box;

  font-family:
  -apple-system,
  BlinkMacSystemFont,
  "Segoe UI",
  Roboto,
  Arial;

  -webkit-tap-highlight-color:
  transparent;

}

/* FUNDO PROFISSIONAL */

body{

  background:

  linear-gradient(
    rgba(0,0,0,0.55),
    rgba(0,0,0,0.75)
  ),

  url("https://images.unsplash.com/photo-1508614589041-895b88991e3e?q=80&w=1600&auto=format&fit=crop");

  background-size:cover;

  background-position:center;

  background-attachment:fixed;

  color:white;

  min-height:100vh;

  padding:15px;

}

/* LOGIN */

#login{

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

}

#app{

  display:none;

}

/* CARD */

.card{

  background:
  rgba(255,255,255,0.12);

  backdrop-filter:blur(14px);

  border-radius:24px;

  padding:20px;

  margin-bottom:15px;

  box-shadow:
  0 4px 20px rgba(0,0,0,0.25);

}

/* TITULOS */

h2,h3{

  margin-bottom:10px;

}

/* INPUTS */

input,
select,
button{

  width:100%;

  border:none;

  border-radius:16px;

  padding:16px;

  margin-top:10px;

  font-size:16px;

  outline:none;

}

/* BOTÕES */

button{

  font-weight:bold;

  cursor:pointer;

}

button:active{

  transform:scale(0.98);

}

.btn{

  background:#34c759;

  color:white;

}

.btn-blue{

  background:#0a84ff;

  color:white;

}

.btn-del{

  background:red;

  color:white;

  width:auto;

  padding:8px 12px;

}

.btn-logout{

  background:#ff3b30;

  color:white;

  width:auto;

}

/* TOPO */

.top{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:10px;

  margin-bottom:15px;

}

/* DASHBOARD */

.dashboard-grid{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:15px;

  margin-bottom:15px;

}

.dashboard-card{

  background:
  rgba(255,255,255,0.12);

  border-radius:24px;

  padding:20px;

  text-align:center;

  backdrop-filter:blur(12px);

  box-shadow:
  0 4px 20px rgba(0,0,0,0.25);

}

.dashboard-card span{

  font-size:30px;

}

.dashboard-card h2{

  font-size:32px;

  margin-top:10px;

}

.dashboard-card p{

  opacity:0.8;

  margin-top:5px;

}

.orange{

  border:2px solid orange;

}

.red{

  border:2px solid red;

}

.blue{

  border:2px solid #0a84ff;

}

/* GRID BATERIAS */

.battery-grid{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:12px;

}

.battery-item{

  display:flex;

  justify-content:space-between;

  align-items:center;

  background:
  rgba(255,255,255,0.08);

  padding:12px;

  border-radius:14px;

  min-height:70px;

  gap:10px;

}

/* HISTORICO */

.history-item{

  background:
  rgba(255,255,255,0.08);

  padding:12px;

  border-radius:14px;

  margin-top:10px;

  line-height:1.6;

}

/* STATUS */

.status-ok{

  color:#34c759;

}

.status-warning{

  color:orange;

}

.status-danger{

  color:red;

}

/* GRAFICO */

canvas{

  width:100% !important;

  height:260px !important;

}

/* RESPONSIVO */

@media(max-width:600px){

  .top{

    flex-direction:column;

    align-items:stretch;

  }

}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">

  <div
    class="card"
    style="
    width:100%;
    max-width:400px;
    "
  >

    <h2 style="text-align:center;">

      🚁 Controle de Baterias

    </h2>

    <input
      id="name"
      placeholder="Nome"
    />

    <input
      id="cpf"
      type="tel"
      inputmode="numeric"
      maxlength="11"
      placeholder="CPF"
      oninput="
      this.value=
      this.value.replace(/[^0-9]/g,'')
      "
    />

    <button
      class="btn"
      onclick="login()"
    >

      Entrar

    </button>

  </div>

</div>

<!-- APP -->

<div id="app">

  <!-- TOPO -->

  <div class="top">

    <div id="userInfo"></div>

    <button
      class="btn-logout"
      onclick="logout()"
    >

      Sair

    </button>

  </div>

  <!-- DASHBOARD -->

  <div class="dashboard-grid">

    <div class="dashboard-card">

      <span>🔋</span>

      <h2 id="totalBatteries">0</h2>

      <p>Baterias</p>

    </div>

    <div class="dashboard-card orange">

      <span>🟠</span>

      <h2 id="warningBatteries">0</h2>

      <p>Próximas da troca</p>

    </div>

    <div class="dashboard-card red">

      <span>🔴</span>

      <h2 id="criticalBatteries">0</h2>

      <p>Críticas</p>

    </div>

    <div class="dashboard-card blue">

      <span>⚡</span>

      <h2 id="totalCycles">0</h2>

      <p>Total ciclos</p>

    </div>

  </div>

  <!-- BUSCA -->

  <div class="card">

    <h3>🔎 Buscar bateria</h3>

    <input
      id="searchBattery"
      placeholder="Digite o nome"
      onkeyup="filterBatteries()"
    />

  </div>

  <!-- NOVA BATERIA -->

  <div class="card">

    <h3>🔋 Nova bateria</h3>

    <input
      id="batteryName"
      placeholder="Nome da bateria"
    />

    <button
      class="btn"
      onclick="addBattery()"
    >

      Adicionar bateria

    </button>

  </div>

  <!-- LISTA -->

  <div class="card">

    <h3>📋 Baterias</h3>

    <div
      id="batteryList"
      class="battery-grid"
    ></div>

  </div>

  <!-- CICLOS -->

  <div class="card">

    <h3>⚡ Registrar ciclo</h3>

    <select id="batterySelect"></select>

    <input
      id="cycleNumber"
      type="number"
      inputmode="numeric"
      placeholder="Número do ciclo"
    />

    <button
      class="btn"
      onclick="addCycle()"
    >

      Registrar ciclo

    </button>

  </div>

  <!-- HISTORICO -->

  <div class="card">

    <h3>📄 Histórico</h3>

    <button
      class="btn-blue"
      onclick="exportPDF()"
    >

      Gerar PDF

    </button>

    <div id="history"></div>

  </div>

  <!-- GRAFICO -->

  <div class="card">

    <h3>📊 Gráfico</h3>

    <canvas id="chart"></canvas>

  </div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getDatabase,
  ref,
  push,
  set,
  onValue,
  remove

}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {

  apiKey:
  "AIzaSyCdUOryg1RFkedMmGG68MjkmpUD5iW8XQE",

  authDomain:
  "controle-baterias-75a1a.firebaseapp.com",

  databaseURL:
  "https://controle-baterias-75a1a-default-rtdb.firebaseio.com",

  projectId:
  "controle-baterias-75a1a",

  storageBucket:
  "controle-baterias-75a1a.firebasestorage.app",

  messagingSenderId:
  "339558617145",

  appId:
  "1:339558617145:web:309d0917e879ea58c3fde8"

};

const app =
initializeApp(firebaseConfig);

const db =
getDatabase(app);

window.firebaseDB = {

  db,
  ref,
  push,
  set,
  onValue,
  remove

};

</script>
<script>

let user = null;

let batteries = [];

let cycles = [];

let chart = null;

/* LOGIN */

function login(){

  let name =
  document.getElementById("name")
  .value.trim();

  let cpf =
  document.getElementById("cpf")
  .value.trim();

  if(!name || cpf.length < 11){

    alert("Preencha corretamente");

    return;

  }

  user = { name, cpf };

  localStorage.setItem(
    "user",
    JSON.stringify(user)
  );

  startApp();

  loadBatteries();

  loadCycles();

}

/* AUTO LOGIN */

window.onload = function(){

  let saved =
  JSON.parse(
    localStorage.getItem("user")
  );

  if(saved){

    user = saved;

    startApp();

    loadBatteries();

    loadCycles();

  }

};

/* START */

function startApp(){

  document.getElementById("login")
  .style.display = "none";

  document.getElementById("app")
  .style.display = "block";

  document.getElementById("userInfo")
  .innerHTML =

  "<strong>" +
  user.name +
  "</strong><br>" +
  user.cpf;

}

/* LOGOUT */

function logout(){

  localStorage.removeItem("user");

  location.reload();

}

/* ADD BATERIA */

async function addBattery(){

  const {
    db,
    ref,
    push,
    set
  } = window.firebaseDB;

  let name =
  document.getElementById("batteryName")
  .value.trim();

  if(!name){

    alert("Digite o nome");
    return;

  }

  const newBattery =
  push(ref(db,"batteries"));

  await set(newBattery,{

    name:name,

    created:Date.now()

  });

  document.getElementById(
    "batteryName"
  ).value = "";

}

/* LOAD BATERIAS */

function loadBatteries(){

  const {
    db,
    ref,
    onValue
  } = window.firebaseDB;

  onValue(
    ref(db,"batteries"),
    (snapshot)=>{

      batteries = [];

      let list =
      document.getElementById(
        "batteryList"
      );

      let select =
      document.getElementById(
        "batterySelect"
      );

      list.innerHTML = "";

      select.innerHTML = "";

      snapshot.forEach((item)=>{

        let data = item.val();

        let battery = {

          id:item.key,

          name:data.name

        };

        batteries.push(battery);

        list.innerHTML += `

          <div class="battery-item">

            <span>
              🔋 ${battery.name}
            </span>

            <button
              class="btn-del"
              onclick="deleteBattery('${battery.id}')"
            >
              X
            </button>

          </div>

        `;

        select.innerHTML += `

          <option value="${battery.id}">
            ${battery.name}
          </option>

        `;

      });

      updateDashboard();

      drawChart();

    }
  );

}

/* DELETE */

async function deleteBattery(id){

  const {
    db,
    ref,
    remove
  } = window.firebaseDB;

  let senha =
  prompt("Senha gestor");

  if(senha !== "DR1DRONE"){

    alert("Senha incorreta");

    return;

  }

  await remove(
    ref(db,"batteries/" + id)
  );

}

/* ADD CICLO */

async function addCycle(){

  const {
    db,
    ref,
    push,
    set
  } = window.firebaseDB;

  let batteryId =
  document.getElementById(
    "batterySelect"
  ).value;

  let cycleNumber =
  document.getElementById(
    "cycleNumber"
  ).value;

  if(!batteryId || !cycleNumber){

    alert("Preencha");

    return;

  }

  const newCycle =
  push(ref(db,"cycles"));

  await set(newCycle,{

    batteryId:batteryId,

    cycleNumber:
    parseInt(cycleNumber),

    timestamp:
    new Date()
    .toLocaleString()

  });

  document.getElementById(
    "cycleNumber"
  ).value = "";

}

/* LOAD CICLOS */

function loadCycles(){

  const {
    db,
    ref,
    onValue
  } = window.firebaseDB;

  onValue(
    ref(db,"cycles"),
    (snapshot)=>{

      cycles = [];

      let history =
      document.getElementById(
        "history"
      );

      history.innerHTML = "";

      snapshot.forEach((item)=>{

        let data = item.val();

        cycles.push({

          id:item.key,

          ...data

        });

      });

      cycles
      .slice()
      .reverse()
      .forEach(c=>{

        let battery =
        batteries.find(
          b => b.id == c.batteryId
        );

        history.innerHTML += `

          <div class="history-item">

            <strong>
              ${battery?.name || "Bateria"}
            </strong>

            <br>

            Ciclo:
            ${c.cycleNumber}

            <br>

            ${c.timestamp}

          </div>

        `;

      });

      updateDashboard();

      drawChart();

    }
  );

}

/* DASHBOARD */

function updateDashboard(){

  document.getElementById(
    "totalBatteries"
  ).innerText =
  batteries.length;

}

/* GRAFICO */

function drawChart(){

  let ctx =
  document
  .getElementById("chart")
  .getContext("2d");

  let labels = [];

  let values = [];

  batteries.forEach(b=>{

    let registros =

    cycles.filter(
      c => c.batteryId == b.id
    );

    let total =

    registros.length > 0

    ? registros[
      registros.length - 1
    ].cycleNumber

    : 0;

    labels.push(b.name);

    values.push(total);

  });

  if(chart){

    chart.destroy();

  }

  chart = new Chart(ctx,{

    type:"bar",

    data:{

      labels,

      datasets:[{

        label:"Ciclos",

        data:values,

        borderRadius:10

      }]

    },

    options:{

      responsive:true,

      maintainAspectRatio:false

    }

  });

}

/* PDF */

function exportPDF(){

  const { jsPDF } =
  window.jspdf;

  let doc =
  new jsPDF();

  let y = 20;

  doc.text(
    "RELATORIO BATERIAS",
    10,
    y
  );

  y += 10;

  cycles.forEach(c=>{

    let battery =
    batteries.find(
      b => b.id == c.batteryId
    );

    doc.text(

      `${battery?.name || ""} - Ciclo ${c.cycleNumber}`,

      10,
      y

    );

    y += 10;

  });

  doc.save(
    "relatorio.pdf"
  );

}

</script>

</body>

</html>
