<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8"/>

<meta
  name="viewport"
  content="width=device-width,
  initial-scale=1.0,
  maximum-scale=1.0,
  user-scalable=no"
/>

<meta name="theme-color" content="#001f3f"/>

<title>Controle de Baterias DR1</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial;
  -webkit-tap-highlight-color:transparent;
}

body{

  background:linear-gradient(135deg,#0a84ff,#001f3f);

  color:white;

  min-height:100vh;

  padding:15px;

}

#login{

  min-height:100vh;

  display:flex;

  justify-content:center;

  align-items:center;

}

#app{
  display:none;
}

.card{

  background:rgba(255,255,255,0.12);

  backdrop-filter:blur(14px);

  border-radius:24px;

  padding:20px;

  margin-bottom:15px;

  box-shadow:0 4px 20px rgba(0,0,0,0.25);

}

.logo{

  width:180px;

  display:block;

  margin:20px auto;

}

input,
select,
button{

  width:100%;

  border:none;

  border-radius:16px;

  padding:16px;

  margin-top:10px;

  font-size:16px;

  outline:none;

}

button{

  font-weight:bold;

  cursor:pointer;

}

button:active{
  transform:scale(0.98);
}

.btn{

  background:#34c759;

  color:white;

}

.btn-export{

  background:#0a84ff;

  color:white;

}

.btn-del{

  background:red;

  color:white;

  width:auto;

  padding:8px 12px;

}

.btn-logout{

  background:#ff3b30;

  color:white;

  width:auto;

}

.top{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:10px;

  margin-bottom:15px;

}

.battery-item{

  display:flex;

  justify-content:space-between;

  align-items:center;

  gap:10px;

  margin-top:10px;

  background:rgba(255,255,255,0.08);

  padding:12px;

  border-radius:14px;

}

.history-item{

  background:rgba(255,255,255,0.08);

  padding:12px;

  border-radius:14px;

  margin-top:10px;

  line-height:1.5;

}

canvas{

  width:100% !important;

  height:240px !important;

}

@media(max-width:600px){

  .top{
    flex-direction:column;
    align-items:stretch;
  }

}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="login">

  <div
    class="card"
    style="width:100%;max-width:400px;"
  >

    <img
      class="logo"
      src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyMDAiIGhlaWdodD0iNjAiPjx0ZXh0IHg9IjUwJSIgeT0iNTAlIiBmaWxsPSJ3aGl0c2UiIGZvbnQtc2l6ZT0iMjQiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGR5PSIuMzVlbSI+RFIxIEFFUk9EWU5FPC90ZXh0Pjwvc3ZnPg=="
    />

    <h2 style="text-align:center;">
      🚁 Controle de Baterias
    </h2>

    <input
      id="name"
      placeholder="Nome"
    />

    <input
      id="cpf"
      type="tel"
      inputmode="numeric"
      maxlength="11"
      placeholder="CPF"
      oninput="this.value=this.value.replace(/[^0-9]/g,'')"
    />

    <button
      class="btn"
      onclick="login()"
    >
      Entrar
    </button>

  </div>

</div>

<!-- APP -->

<div id="app">

  <div class="top">

    <div id="userInfo"></div>

    <button
      class="btn-logout"
      onclick="logout()"
    >
      Sair
    </button>

  </div>

  <!-- NOVA BATERIA -->

  <div class="card">

    <h3>🔋 Nova bateria</h3>

    <input
      id="batteryName"
      placeholder="Nome da bateria"
    />

    <button
      class="btn"
      onclick="addBattery()"
    >
      Adicionar bateria
    </button>

  </div>

  <!-- LISTA -->

  <div class="card">

    <h3>📋 Baterias</h3>

    <div id="batteryList"></div>

  </div>

  <!-- CICLOS -->

  <div class="card">

    <h3>⚡ Registrar ciclo</h3>

    <select id="batterySelect"></select>

    <input
      id="cycleNumber"
      type="number"
      inputmode="numeric"
      placeholder="Número do ciclo"
    />

    <button
      class="btn"
      onclick="addCycle()"
    >
      Registrar ciclo
    </button>

  </div>

  <!-- HISTÓRICO -->

  <div class="card">

    <h3>📄 Histórico</h3>

    <button
      class="btn-export"
      onclick="exportPDF()"
    >
      Gerar PDF
    </button>

    <div id="history"></div>

  </div>

  <!-- GRÁFICO -->

  <div class="card">

    <h3>📊 Gráfico</h3>

    <canvas id="chart"></canvas>

  </div>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {

  getDatabase,
  ref,
  push,
  set,
  onValue,
  remove

}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// CONFIG FIREBASE

const firebaseConfig = {

  apiKey: "AIzaSyCdUOryg1RFkedMmGG68MjkmpUD5iW8XQE",

  authDomain: "controle-baterias-75a1a.firebaseapp.com",

  databaseURL: "https://controle-baterias-75a1a-default-rtdb.firebaseio.com",

  projectId: "controle-baterias-75a1a",

  storageBucket: "controle-baterias-75a1a.firebasestorage.app",

  messagingSenderId: "339558617145",

  appId: "1:339558617145:web:309d0917e879ea58c3fde8"

};

// INICIAR

const app = initializeApp(firebaseConfig);

const db = getDatabase(app);

// GLOBAL

window.firebaseDB = {

  db,
  ref,
  push,
  set,
  onValue,
  remove

};

</script>

<!-- SCRIPT PRINCIPAL -->

<script>

let user = null;

let batteries = [];

let cycles = [];

let chart = null;

// LOGIN

function login(){

  let name = document
    .getElementById("name")
    .value
    .trim();

  let cpf = document
    .getElementById("cpf")
    .value
    .trim();

  if(!name || cpf.length < 11){

    alert("Preencha corretamente");
    return;

  }

  user = { name, cpf };

  localStorage.setItem(
    "user",
    JSON.stringify(user)
  );

  startApp();

  loadBatteries();

  loadCycles();

}

// AUTO LOGIN

window.onload = function(){

  let saved = JSON.parse(
    localStorage.getItem("user")
  );

  if(saved){

    user = saved;

    startApp();

    loadBatteries();

    loadCycles();

  }

};

// LOGOUT

function logout(){

  localStorage.removeItem("user");

  location.reload();

}

// START APP

function startApp(){

  document
    .getElementById("login")
    .style.display = "none";

  document
    .getElementById("app")
    .style.display = "block";

  document
    .getElementById("userInfo")
    .innerHTML =
      "<strong>" +
      user.name +
      "</strong><br>" +
      user.cpf;

}

// ADICIONAR BATERIA

async function addBattery(){

  const {

    db,
    ref,
    push,
    set

  } = window.firebaseDB;

  let name = document
    .getElementById("batteryName")
    .value
    .trim();

  if(!name){

    alert("Digite o nome");
    return;

  }

  const newBattery = push(
    ref(db,"batteries")
  );

  await set(newBattery,{

    name:name,

    user:user.cpf,

    created:Date.now()

  });

  document
    .getElementById("batteryName")
    .value = "";

}

// CARREGAR BATERIAS

function loadBatteries(){

  const {

    db,
    ref,
    onValue

  } = window.firebaseDB;

  onValue(
    ref(db,"batteries"),
    (snapshot)=>{

      batteries = [];

      let list = document
        .getElementById("batteryList");

      let select = document
        .getElementById("batterySelect");

      list.innerHTML = "";

      select.innerHTML = "";

      snapshot.forEach((item)=>{

        let data = item.val();

        if(data.user == user.cpf){

          let battery = {

            id:item.key,

            name:data.name

          };

          batteries.push(battery);

          list.innerHTML += `

            <div class="battery-item">

              <span>
                🔋 ${battery.name}
              </span>

              <button
                class="btn-del"
                onclick="deleteBattery('${battery.id}')"
              >
                X
              </button>

            </div>

          `;

          select.innerHTML += `

            <option value="${battery.id}">
              ${battery.name}
            </option>

          `;

        }

      });

      drawChart();

    }
  );

}

// DELETAR

async function deleteBattery(id){

  const {

    db,
    ref,
    remove

  } = window.firebaseDB;

  let senha = prompt(
    "Senha do gestor"
  );

  if(senha !== "DR1DRONE"){

    alert("Senha incorreta");
    return;

  }

  await remove(
    ref(db,"batteries/" + id)
  );

}

// ADICIONAR CICLO

async function addCycle(){

  const {

    db,
    ref,
    push,
    set

  } = window.firebaseDB;

  let batteryId = document
    .getElementById("batterySelect")
    .value;

  let cycleNumber = document
    .getElementById("cycleNumber")
    .value;

  if(!batteryId || !cycleNumber){

    alert("Preencha os dados");
    return;

  }

  const newCycle = push(
    ref(db,"cycles")
  );

  await set(newCycle,{

    batteryId:batteryId,

    cycleNumber:parseInt(cycleNumber),

    user:user.cpf,

    timestamp:new Date()
      .toLocaleString()

  });

  document
    .getElementById("cycleNumber")
    .value = "";

}

// CARREGAR CICLOS

function loadCycles(){

  const {

    db,
    ref,
    onValue

  } = window.firebaseDB;

  onValue(
    ref(db,"cycles"),
    (snapshot)=>{

      cycles = [];

      let history = document
        .getElementById("history");

      history.innerHTML = "";

      snapshot.forEach((item)=>{

        let data = item.val();

        if(data.user == user.cpf){

          cycles.push({

            id:item.key,

            ...data

          });

        }

      });

      cycles
        .slice()
        .reverse()
        .forEach(c=>{

          let battery = batteries.find(
            b => b.id == c.batteryId
          );

          let status = "🟢 OK";

          if(c.cycleNumber >= 220){

            status = "🔴 TROCA URGENTE";

          }else if(c.cycleNumber >= 195){

            status = "🟠 TROCAR EM BREVE";

          }

          history.innerHTML += `

            <div class="history-item">

              <strong>
                ${battery?.name || "Bateria"}
              </strong>

              <br>

              Ciclo: ${c.cycleNumber}

              <br>

              ${c.timestamp}

              <br>

              ${status}

            </div>

          `;

        });

      drawChart();

    }
  );

}

// GRÁFICO

function drawChart(){

  let ctx = document
    .getElementById("chart")
    .getContext("2d");

  let labels = [];

  let values = [];

  let colors = [];

  batteries.forEach(b=>{

    let registros = cycles.filter(
      c => c.batteryId == b.id
    );

    let total = registros.length > 0
      ? registros[
          registros.length - 1
        ].cycleNumber
      : 0;

    labels.push(b.name);

    values.push(total);

    if(total >= 220){

      colors.push("red");

    }else if(total >= 195){

      colors.push("orange");

    }else{

      colors.push("#34c759");

    }

  });

  if(chart){

    chart.destroy();

  }

  chart = new Chart(ctx,{

    type:"bar",

    data:{

      labels,

      datasets:[{

        label:"Ciclos",

        data:values,

        backgroundColor:colors,

        borderRadius:10

      }]

    },

    options:{

      responsive:true,

      maintainAspectRatio:false,

      plugins:{

        legend:{

          labels:{
            color:"white"
          }

        }

      },

      scales:{

        x:{
          ticks:{
            color:"white"
          }
        },

        y:{

          beginAtZero:true,

          max:360,

          ticks:{

            color:"white",

            stepSize:10

          }

        }

      }

    }

  });

}

// PDF

function exportPDF(){

  if(cycles.length === 0){

    alert("Sem dados");
    return;

  }

  const { jsPDF } = window.jspdf;

  let doc = new jsPDF();

  let y = 20;

  doc.setFontSize(18);

  doc.text(
    "RELATORIO DE BATERIAS",
    10,
    y
  );

  y += 12;

  doc.setFontSize(12);

  doc.text(
    "Nome: " + user.name,
    10,
    y
  );

  y += 8;

  doc.text(
    "CPF: " + user.cpf,
    10,
    y
  );

  y += 12;

  cycles.forEach((c,index)=>{

    let battery = batteries.find(
      b => b.id == c.batteryId
    );

    let status = "OK";

    if(c.cycleNumber >= 220){

      status = "TROCA URGENTE";

    }else if(c.cycleNumber >= 195){

      status = "TROCAR EM BREVE";

    }

    doc.text(
      `${index+1} - ${battery?.name || ""}`,
      10,
      y
    );

    y += 7;

    doc.text(
      `Ciclo: ${c.cycleNumber}`,
      10,
      y
    );

    y += 7;

    doc.text(
      `Status: ${status}`,
      10,
      y
    );

    y += 7;

    doc.text(
      `Data: ${c.timestamp}`,
      10,
      y
    );

    y += 12;

    if(y > 270){

      doc.addPage();

      y = 20;

    }

  });

  doc.save(
    "relatorio_baterias.pdf"
  );

}

</script>

</body>
</html>
